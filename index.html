<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>和田週報入力</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Hiragino Sans','Noto Sans JP',sans-serif;background:#f0f2f5;min-height:100vh}
.app{max-width:480px;margin:0 auto;padding-bottom:80px}
.header{background:linear-gradient(135deg,#0d4f34,#1a7a56,#22956a);padding:16px 16px 12px;color:#fff;position:sticky;top:0;z-index:100}
.header-row{display:flex;justify-content:space-between;align-items:center}
.header-title-sub{font-size:11px;opacity:.8;letter-spacing:2px}
.header-title{font-size:20px;font-weight:700;margin-top:2px}
.header-btns{display:flex;gap:6px;align-items:center}
.header-btn{background:rgba(255,255,255,.2);border:none;border-radius:8px;width:38px;height:38px;font-size:16px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center}
.save-bar{margin-top:10px;display:flex;gap:8px;align-items:center}
.save-btn{flex:1;padding:10px 0;border-radius:8px;border:none;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s}
.save-btn.dirty{background:#fff;color:#1a6b4a}
.save-btn.clean{background:rgba(255,255,255,.15);color:#fff;opacity:.6;cursor:default}
.save-btn.saving{background:rgba(255,255,255,.4);color:#fff}
.save-btn.error{background:#e74c3c;color:#fff}
.save-btn.saved{background:rgba(255,255,255,.3);color:#fff}
.dirty-label{font-size:10px;color:rgba(255,255,255,.8);white-space:nowrap}
.export-panel{margin-top:10px;background:rgba(0,0,0,.2);border-radius:10px;padding:10px;display:flex;gap:10px}
.export-btn{flex:1;padding:10px 0;border-radius:8px;border:none;background:rgba(255,255,255,.9);color:#1a4a35;font-size:14px;font-weight:600;cursor:pointer}
.conn-bar{padding:6px 16px;font-size:11px;text-align:center;cursor:pointer}
.conn-bar.online{background:#d4edda;color:#155724}
.conn-bar.offline{background:#fff3cd;color:#856404}
.conn-bar.error{background:#f8d7da;color:#721c24}
.setup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.setup-card{background:#fff;border-radius:16px;padding:24px;max-width:400px;width:100%}
.setup-card h2{font-size:18px;color:#1a4a35;margin-bottom:12px}
.setup-card p{font-size:13px;color:#666;margin-bottom:12px;line-height:1.6}
.setup-input{width:100%;padding:12px;border:1.5px solid #1a6b4a;border-radius:8px;font-size:14px;margin-bottom:12px}
.setup-btn{width:100%;padding:12px;border:none;border-radius:8px;background:#1a6b4a;color:#fff;font-size:15px;font-weight:700;cursor:pointer}
.tab-bar{display:flex;background:#fff;border-bottom:1px solid #e0e0e0;position:sticky;z-index:99}
.tab-btn{flex:1;padding:10px 0 8px;border:none;border-bottom:3px solid transparent;background:#fff;cursor:pointer;transition:all .2s}
.tab-btn.active{border-bottom-color:#1a6b4a;background:#f0faf5}
.tab-icon{font-size:16px}
.tab-label{font-size:11px;margin-top:1px;color:#888}
.tab-btn.active .tab-label{font-weight:700;color:#1a6b4a}
.tab-pct{font-size:10px;color:#aaa}
.date-area{background:#fff;border-bottom:1px solid #eee;padding:10px 12px}
.date-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;align-items:center;-webkit-overflow-scrolling:touch}
.date-btn{flex-shrink:0;padding:8px 12px;border-radius:10px;border:1.5px solid #ddd;background:#fff;cursor:pointer;font-size:13px;color:#666;min-width:68px;text-align:center;position:relative}
.date-btn.active{border:2px solid #1a6b4a;background:#e8f5ee;font-weight:700;color:#1a6b4a}
.date-text{font-size:14px;font-weight:600}
.today-label{font-size:9px;color:#1a6b4a;font-weight:700;margin-top:1px}
.date-badge{position:absolute;top:-5px;right:-5px;background:#1a6b4a;color:#fff;border-radius:8px;font-size:9px;font-weight:700;padding:1px 5px;min-width:14px;text-align:center}
.add-date-btn{flex-shrink:0;width:44px;height:44px;border-radius:10px;border:2px dashed #aaa;background:#fafafa;font-size:22px;color:#888;cursor:pointer;display:flex;align-items:center;justify-content:center}
.add-date-btn.open{background:#e8f5ee;color:#1a6b4a;border-color:#1a6b4a}
.datepicker-panel{margin-top:8px;background:#f0faf5;border-radius:12px;padding:14px;border:1px solid #c3e6cb}
.datepicker-panel h3{font-size:14px;font-weight:700;color:#1a4a35;margin-bottom:10px}
.quick-dates{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.quick-date-btn{padding:7px 12px;border-radius:8px;border:1.5px solid #1a6b4a;background:#fff;color:#1a6b4a;font-size:13px;font-weight:600;cursor:pointer}
.quick-date-btn.used{border-color:#ddd;background:#eee;color:#aaa;opacity:.5;cursor:default}
.date-input-row{display:flex;gap:8px;margin-top:8px}
.date-input{flex:1;padding:10px 12px;border-radius:8px;border:1.5px solid #1a6b4a;font-size:16px;background:#fff}
.date-add-btn{padding:10px 20px;border-radius:8px;border:none;background:#1a6b4a;color:#fff;font-size:14px;font-weight:700;cursor:pointer}
.date-add-btn:disabled{background:#aaa}
.date-close-btn{padding:10px 20px;border-radius:8px;border:1px solid #ccc;background:#fff;color:#666;font-size:14px;cursor:pointer}
.delete-bar{margin-top:6px;display:flex;justify-content:flex-end}
.delete-link{background:none;border:none;color:#c0392b;font-size:12px;cursor:pointer;padding:4px 8px;opacity:.7}
.delete-confirm{margin-top:8px;background:#fff3f3;border-radius:10px;padding:12px;border:1px solid #f5c6cb}
.delete-confirm p{font-size:13px;color:#721c24;margin-bottom:8px}
.delete-confirm .btns{display:flex;gap:8px}
.del-yes{flex:1;padding:8px 0;border-radius:8px;border:none;background:#dc3545;color:#fff;font-size:13px;font-weight:600;cursor:pointer}
.del-no{flex:1;padding:8px 0;border-radius:8px;border:1px solid #ccc;background:#fff;color:#666;font-size:13px;cursor:pointer}
.content{padding:8px 12px}
.group-card{background:#fff;border-radius:12px;margin-bottom:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.group-header{width:100%;padding:14px 16px;border:none;background:none;display:flex;justify-content:space-between;align-items:center;cursor:pointer;text-align:left}
.group-title{font-size:15px;font-weight:700;color:#1a4a35}
.group-location{font-size:11px;color:#888;margin-left:8px}
.group-meta{display:flex;align-items:center;gap:8px}
.group-count{font-size:11px;color:#aaa}
.group-count.done{color:#22956a}
.group-arrow{font-size:12px;color:#aaa;transition:transform .2s}
.group-arrow.open{transform:rotate(180deg)}
.group-body{padding:0 16px 14px}
.bulk-bar{display:flex;gap:8px;margin-bottom:12px;padding:8px 0;border-bottom:1px solid #eee}
.bulk-btn{padding:6px 14px;border-radius:8px;border:1.5px solid #1a6b4a;background:#e8f5ee;color:#1a6b4a;font-size:12px;font-weight:600;cursor:pointer}
.bulk-btn:active{background:#1a6b4a;color:#fff}
.field{margin-bottom:14px}
.field-label{font-size:13px;font-weight:600;color:#444;display:block;margin-bottom:4px}
.field-input{width:100%;padding:10px 12px;border-radius:8px;border:1.5px solid #ccc;font-size:16px;background:#fafbfc;outline:none}
.field-input:focus{border-color:#1a6b4a}
textarea.field-input{min-height:60px;resize:vertical}
.status-row{display:flex;gap:6px}
.status-btn{width:44px;height:44px;border-radius:10px;border:1.5px solid #ccc;background:#fff;font-size:20px;font-weight:600;color:#666;cursor:pointer;transition:all .15s}
.status-btn.sel-ok{border:2.5px solid #1a6b4a;background:#d4edda;color:#1a6b4a}
.status-btn.sel-warn{border:2.5px solid #1a6b4a;background:#fff3cd;color:#1a6b4a}
.status-btn.sel-bad{border:2.5px solid #1a6b4a;background:#f8d7da;color:#1a6b4a}
.status-btn.sel-off{border:2.5px solid #1a6b4a;background:#e2e3e5;color:#1a6b4a}
.select-row{display:flex;flex-wrap:wrap;gap:6px}
.select-btn{padding:8px 14px;border-radius:8px;border:1.5px solid #ccc;background:#fff;font-size:14px;color:#555;cursor:pointer}
.select-btn.active{border:2px solid #1a6b4a;background:#d4edda;font-weight:600;color:#1a6b4a}
.num-dash-row{display:flex;gap:6px;align-items:center}
.num-dash-row .field-input{flex:1}
.dash-btn{width:44px;height:44px;border-radius:10px;border:1.5px solid #ccc;background:#fff;font-size:20px;font-weight:600;color:#666;cursor:pointer}
.dash-btn.active{border:2.5px solid #1a6b4a;background:#e2e3e5;color:#1a6b4a}
.remarks-section{margin-top:8px;padding-top:8px;border-top:1px dashed #ddd}
.remarks-label{font-size:12px;color:#888;margin-bottom:4px}
.list-toggle{display:flex;gap:6px;margin-bottom:10px}
.list-toggle-btn{flex:1;padding:8px 0;border-radius:8px;border:1.5px solid #ddd;background:#fff;font-size:13px;color:#666;cursor:pointer}
.list-toggle-btn.active{border:2px solid #1a6b4a;background:#e8f5ee;font-weight:700;color:#1a6b4a}
.list-table-wrap{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.list-table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.list-table{width:100%;border-collapse:collapse;font-size:12px;min-width:300px}
.list-table th{padding:8px 6px;font-weight:600;white-space:nowrap}
.list-table td{padding:6px 6px;border-bottom:1px solid #f0f0f0}
.list-hdr-row{background:#e8f5ee}
.list-hdr-row td{padding:6px 10px;font-weight:700;font-size:12px;color:#1a4a35;border-bottom:1px solid #d4edda}
.loading{display:flex;justify-content:center;align-items:center;min-height:300px;font-size:18px;color:#888}
</style>
</head>
<body>
<div class="app" id="app"></div>

let S={dates:[],dayData:{},selectedDate:null,tab:'water',showExport:false,showDatePicker:false,confirmDelete:null,expandedGroups:{},newDate:todayStr(),connStatus:'offline',dirty:false,saveStatus:'',loading:true,needSetup:!GAS_URL,listSection:'waterQuality'};

function todayStr(){return new Date().toISOString().split('T')[0]}
function formatDateShort(ds){const d=new Date(ds+'T00:00:00');return`${d.getMonth()+1}/${d.getDate()}(${'日月火水木金土'[d.getDay()]})`}
function formatDateFull(ds){const d=new Date(ds+'T00:00:00');return`${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`}
function emptyDay(){return{waterQuality:{},equipment:{},electrical:{}}}
function curDay(){return S.dayData[S.selectedDate]||emptyDay()}
function secKey(){return S.tab==='water'?'waterQuality':S.tab==='equip'?'equipment':'electrical'}
function dayFilled(d,sec){const dd=S.dayData[d];if(!dd)return 0;return Object.keys(dd[sec]).filter(k=>dd[sec][k]!==''&&dd[sec][k]!=null).length}

// ─── API ────────────────────────────────────────────────────────────────
async function apiGet(p){const r=await fetch(GAS_URL+'?'+new URLSearchParams(p));return r.json()}
async function apiPost(p){const r=await fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(p)});return r.json()}

function saveLocal(){try{localStorage.setItem(LOCAL_KEY,JSON.stringify({dates:S.dates,dayData:S.dayData}))}catch(e){}}
function loadLocal(){try{const d=localStorage.getItem(LOCAL_KEY);return d?JSON.parse(d):null}catch(e){return null}}

async function loadAllData(){
  try{
    const r=await apiGet({action:'getAllData'});
    if(r.success){S.dates=r.dates||[];S.dayData={};(r.dates||[]).forEach(d=>{S.dayData[d]=r.dayData?.[d]||emptyDay()});
    if(!S.selectedDate||!S.dates.includes(S.selectedDate))S.selectedDate=S.dates[S.dates.length-1]||null;
    S.connStatus='online';saveLocal();}else{S.connStatus='error';const loc=loadLocal();if(loc){S.dates=loc.dates;S.dayData=loc.dayData;S.selectedDate=S.dates[S.dates.length-1]||null}}
  }catch(e){console.error(e);S.connStatus='error';const loc=loadLocal();if(loc){S.dates=loc.dates;S.dayData=loc.dayData;S.selectedDate=S.dates[S.dates.length-1]||null}}
  S.loading=false;render();
}

async function doSave(){
  S.saveStatus='saving';render();
  saveLocal();
  try{
    // Save each date's data
    for(const d of S.dates){
      for(const sec of['waterQuality','equipment','electrical']){
        const fields=S.dayData[d]?.[sec];
        if(fields&&Object.keys(fields).length>0){
          await apiPost({action:'saveDayData',date:d,section:sec,fields});
        }
      }
    }
    // Ensure all dates exist
    for(const d of S.dates){await apiPost({action:'addDate',date:d})}
    S.dirty=false;S.saveStatus='saved';S.connStatus='online';render();
    setTimeout(()=>{S.saveStatus='';render()},2000);
  }catch(e){console.error(e);S.saveStatus='error';S.connStatus='error';render();setTimeout(()=>{S.saveStatus='';render()},3000)}
}

// Auto-save with debounce
let autoSaveTimer=null;
function scheduleAutoSave(){
  clearTimeout(autoSaveTimer);
  autoSaveTimer=setTimeout(()=>{if(S.dirty&&GAS_URL)doSave()},5000);
}

function setField(sec,fieldId,val){
  const d=S.selectedDate;if(!d)return;
  if(!S.dayData[d])S.dayData[d]=emptyDay();
  S.dayData[d][sec][fieldId]=val;
  S.dirty=true;
  saveLocal();
  render();
  scheduleAutoSave();
}

function setBulkOk(sec,checks){
  const d=S.selectedDate;if(!d)return;
  if(!S.dayData[d])S.dayData[d]=emptyDay();
  checks.forEach(ch=>{if(ch.type==='status')S.dayData[d][sec][ch.id]='○'});
  S.dirty=true;saveLocal();render();scheduleAutoSave();
}

async function addDateR(ds){
  if(S.dates.includes(ds)){S.selectedDate=ds;S.showDatePicker=false;render();return}
  S.dates.push(ds);S.dates.sort();S.dayData[ds]=emptyDay();S.selectedDate=ds;S.showDatePicker=false;S.dirty=true;saveLocal();
  try{await apiPost({action:'addDate',date:ds});S.connStatus='online'}catch(e){S.connStatus='error'}
  render();
}

async function removeDateR(ds){
  if(S.dates.length<=1)return;
  S.dates=S.dates.filter(d=>d!==ds);delete S.dayData[ds];
  if(S.selectedDate===ds)S.selectedDate=S.dates[S.dates.length-1]||null;
  S.confirmDelete=null;saveLocal();
  try{await apiPost({action:'removeDate',date:ds});S.connStatus='online'}catch(e){S.connStatus='error'}
  render();
}

async function resetAllR(){
  if(!confirm('すべてのデータをリセットしますか？'))return;
  try{await apiPost({action:'resetAll'});S.connStatus='online'}catch(e){S.connStatus='error'}
  S.dates=[];S.dayData={};S.selectedDate=null;S.dirty=false;saveLocal();render();
}

// ─── AUTO-ADVANCE ───────────────────────────────────────────────────────
function advanceField(fieldEl){
  if(!fieldEl)return;
  const parent=fieldEl.parentElement;if(!parent)return;
  const all=Array.from(parent.querySelectorAll('[data-fi]'));
  const idx=all.indexOf(fieldEl);
  if(idx<0||idx>=all.length-1)return;
  const next=all[idx+1];
  next.scrollIntoView({behavior:'smooth',block:'center'});
  const inp=next.querySelector('input,textarea');
  if(inp)setTimeout(()=>inp.focus(),120);
}

// ─── RENDER HELPERS ─────────────────────────────────────────────────────
function h(tag,attrs,...ch){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='className')el.className=v;
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else el.setAttribute(k,v);
  });
  ch.flat(Infinity).forEach(c=>{if(c!=null)el.appendChild(typeof c==='string'?document.createTextNode(c):c)});
  return el;
}

function renderField(field,value,onChange,containerEl){
  const adv=()=>setTimeout(()=>advanceField(containerEl),100);
  const onKey=(e)=>{if(e.key==='Enter'){e.preventDefault();adv()}};

  if(field.type==='status'){
    return h('div',{className:'status-row'},STATUS_OPTIONS.map(s=>
      h('button',{className:'status-btn'+(value===s?(' sel-'+(s==='○'?'ok':s==='△'?'warn':s==='×'?'bad':'off')):''),
        onClick:()=>{onChange(s);adv()}},s)));
  }
  if(field.type==='num_dash'){
    const isDash=value==='－';
    return h('div',{className:'num-dash-row'},
      h('input',{className:'field-input',type:'text',inputMode:'decimal',placeholder:'数値入力',value:isDash?'':String(value??''),disabled:isDash?'true':undefined,
        onInput:(e)=>onChange(e.target.value),onKeydown:onKey}),
      h('button',{className:'dash-btn'+(isDash?' active':''),onClick:()=>{onChange(isDash?'':'－');adv()}},'－'));
  }
  if(field.type==='signed_number'){
    return h('input',{className:'field-input',type:'text',inputMode:'decimal',placeholder:'例: -0.79',value:String(value??''),
      onInput:(e)=>onChange(e.target.value),onKeydown:onKey});
  }
  if(field.type==='select'){
    return h('div',{className:'select-row'},field.options.map(opt=>
      h('button',{className:'select-btn'+(value===opt?' active':''),onClick:()=>{onChange(opt);adv()}},opt)));
  }
  if(field.type==='textarea'){
    return h('textarea',{className:'field-input',rows:'3',placeholder:'入力してください',value:value||'',onInput:(e)=>onChange(e.target.value)});
  }
  // number & text: keep as string for decimal preservation
  return h('input',{className:'field-input',type:'text',inputMode:field.type==='number'?'decimal':'text',
    placeholder:'入力してください',value:String(value??''),onInput:(e)=>onChange(e.target.value),onKeydown:onKey});
}

function renderGroup(key,title,locStr,items,section,opts){
  const isOpen=S.expandedGroups[key]!==false;
  const dd=curDay()[section]||{};
  const filled=items.filter(it=>dd[it.id]!=null&&dd[it.id]!=='').length;
  const hasStat=items.some(it=>it.type==='status');
  const rId=opts?.remarksId;

  const card=h('div',{className:'group-card'});
  const header=h('button',{className:'group-header',onClick:()=>{S.expandedGroups[key]=!isOpen;render()}},
    h('span',null,h('span',{className:'group-title'},title),locStr?h('span',{className:'group-location'},locStr):null),
    h('div',{className:'group-meta'},
      h('span',{className:'group-count'+(filled>=items.length?' done':'')},`${filled}/${items.length}`),
      h('span',{className:'group-arrow'+(isOpen?' open':''),'aria-hidden':'true'},'▼')));
  card.appendChild(header);

  if(isOpen){
    const body=h('div',{className:'group-body'});
    if(hasStat&&(section==='equipment'||section==='electrical')){
      body.appendChild(h('div',{className:'bulk-bar'},h('button',{className:'bulk-btn',onClick:()=>setBulkOk(section,items)},'一括 ○（正常）')));
    }
    items.forEach((field,fi)=>{
      const fdiv=h('div',{className:'field','data-fi':fi});
      fdiv.appendChild(h('label',{className:'field-label'},field.label));
      fdiv.appendChild(renderField(field,dd[field.id],(v)=>setField(section,field.id,v),fdiv));
      body.appendChild(fdiv);
    });
    if(rId){
      body.appendChild(h('div',{className:'remarks-section'},
        h('div',{className:'remarks-label'},'備考'),
        h('textarea',{className:'field-input',rows:'2',placeholder:'備考を入力',value:dd[rId]||'',onInput:(e)=>setField(section,rId,e.target.value)})));
    }
    card.appendChild(body);
  }
  return card;
}

function exportCSV(){
  let csv='\uFEFF';const dates=S.dates,dl=dates.map(d=>formatDateFull(d));
  csv+='【水質】\n項目,サブ項目,'+dl.join(',')+'\n';
  WATER_QUALITY_FIELDS.forEach(g=>g.items.forEach(it=>{csv+=`${g.group},${it.label},${dates.map(d=>S.dayData[d]?.waterQuality?.[it.id]??'').join(',')}\n`}));
  csv+='\n【機器点検】\n機器名,設置場所,点検項目,'+dl.join(',')+'\n';
  EQUIPMENT_ITEMS.forEach(eq=>{eq.checks.forEach(ch=>{csv+=`${eq.equipment},${eq.location},${ch.label},${dates.map(d=>S.dayData[d]?.equipment?.[ch.id]??'').join(',')}\n`});
    const rv=dates.map(d=>S.dayData[d]?.equipment?.[eq.remarksId]??'');if(rv.some(v=>v))csv+=`${eq.equipment},,備考,${rv.join(',')}\n`});
  csv+='\n【電気設備】\n機器名,点検項目,'+dl.join(',')+'\n';
  ELECTRICAL_ITEMS.forEach(eq=>{eq.checks.forEach(ch=>{csv+=`${eq.equipment},${ch.label},${dates.map(d=>S.dayData[d]?.electrical?.[ch.id]??'').join(',')}\n`});
    const rv=dates.map(d=>S.dayData[d]?.electrical?.[eq.remarksId]??'');if(rv.some(v=>v))csv+=`${eq.equipment},備考,${rv.join(',')}\n`});
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`wada_report_${dates[0]||'data'}.csv`;a.click();URL.revokeObjectURL(url);
}

function exportJSON(){
  const blob=new Blob([JSON.stringify({dates:S.dates,dayData:S.dayData},null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`wada_report_${S.dates[0]||'data'}.json`;a.click();URL.revokeObjectURL(url);

  tabs.forEach(t=>{
    let pct='';
    if(t.sec){const f=S.dates.reduce((s,d)=>s+dayFilled(d,t.sec),0);const perDay=t.sec==='waterQuality'?WATER_QUALITY_FIELDS.reduce((s,g)=>s+g.items.length,0):t.sec==='equipment'?EQUIPMENT_ITEMS.reduce((s,e)=>s+e.checks.length,0):ELECTRICAL_ITEMS.reduce((s,e)=>s+e.checks.length,0);const tot=perDay*S.dates.length;pct=tot>0?Math.round(f/tot*100)+'%':'0%'}
    const btn=h('button',{className:'tab-btn'+(S.tab===t.id?' active':''),onClick:()=>{S.tab=t.id;render()}},
      h('div',{className:'tab-icon'},t.icon),h('div',{className:'tab-label'},t.l),t.sec?h('div',{className:'tab-pct'},pct):null);
    tabBar.appendChild(btn);
  });
  app.appendChild(tabBar);

  // Date selector (hidden on list tab)
  if(S.tab!=='list'){
    const da=h('div',{className:'date-area'});
    const ds=h('div',{className:'date-scroll'});
    S.dates.forEach(d=>{
      const f=dayFilled(d,secKey()),act=d===S.selectedDate,td=d===todayStr();
      const btn=h('button',{className:'date-btn'+(act?' active':''),onClick:()=>{S.selectedDate=d;S.confirmDelete=null;render()}},
        h('div',{className:'date-text'},formatDateShort(d)),td?h('div',{className:'today-label'},'TODAY'):null,f>0?h('div',{className:'date-badge'},String(f)):null);
      ds.appendChild(btn);
    });
    ds.appendChild(h('button',{className:'add-date-btn'+(S.showDatePicker?' open':''),onClick:()=>{S.showDatePicker=!S.showDatePicker;S.confirmDelete=null;render()}},S.showDatePicker?'×':'+'));
    da.appendChild(ds);

    if(S.selectedDate&&!S.showDatePicker&&!S.confirmDelete&&S.dates.length>1){
      da.appendChild(h('div',{className:'delete-bar'},h('button',{className:'delete-link',onClick:()=>{S.confirmDelete=S.selectedDate;render()}},'🗑 '+formatDateShort(S.selectedDate)+' を削除')));
    }
    if(S.confirmDelete){
      da.appendChild(h('div',{className:'delete-confirm'},
        h('p',null,h('strong',null,formatDateShort(S.confirmDelete)),' のデータを削除しますか？'),
        h('div',{className:'btns'},h('button',{className:'del-yes',onClick:()=>removeDateR(S.confirmDelete)},'削除する'),h('button',{className:'del-no',onClick:()=>{S.confirmDelete=null;render()}},'キャンセル'))));
    }
    if(S.showDatePicker){
      const panel=h('div',{className:'datepicker-panel'},h('h3',null,'点検日を追加'));
      const qd=h('div',{className:'quick-dates'});
      for(let i=0;i<7;i++){const d=new Date();d.setDate(d.getDate()-i);const ds2=d.toISOString().split('T')[0];const used=S.dates.includes(ds2);
        qd.appendChild(h('button',{className:'quick-date-btn'+(used?' used':''),onClick:()=>{if(!used)addDateR(ds2)},disabled:used?'true':undefined},(i===0?'今日':i===1?'昨日':formatDateShort(ds2))+(used?' ✓':'')));}
      panel.appendChild(qd);
      panel.appendChild(h('div',{style:{fontSize:'12px',color:'#666',marginBottom:'6px'}},'または日付を選択:'));
      const dir=h('div',{className:'date-input-row'});
      dir.appendChild(h('input',{className:'date-input',type:'date',value:S.newDate,onInput:(e)=>{S.newDate=e.target.value}}));
      dir.appendChild(h('button',{className:'date-add-btn',disabled:S.dates.includes(S.newDate)?'true':undefined,onClick:()=>addDateR(S.newDate)},S.dates.includes(S.newDate)?'追加済み':'追加'));
      dir.appendChild(h('button',{className:'date-close-btn',onClick:()=>{S.showDatePicker=false;render()}},'閉じる'));
      panel.appendChild(dir);da.appendChild(panel);
    }
    app.appendChild(da);
  }

  // Content
  const content=h('div',{className:'content'});
  if(S.tab==='list'){
    content.appendChild(renderListTab());
  }else if(!S.selectedDate){
    content.appendChild(h('div',{style:{padding:'40px 20px',textAlign:'center',color:'#888'}},'「+」ボタンから点検日を追加してください'));
  }else if(S.tab==='water'){
    WATER_QUALITY_FIELDS.forEach((g,gi)=>content.appendChild(renderGroup(`wq-${gi}`,g.group,null,g.items,'waterQuality')));
  }else if(S.tab==='equip'){
    EQUIPMENT_ITEMS.forEach((eq,ei)=>content.appendChild(renderGroup(`eq-${ei}`,eq.equipment,eq.location,eq.checks,'equipment',{remarksId:eq.remarksId})));
  }else{
    ELECTRICAL_ITEMS.forEach((eq,ei)=>content.appendChild(renderGroup(`el-${ei}`,eq.equipment,null,eq.checks,'electrical',{remarksId:eq.remarksId})));
  }
  app.appendChild(content);
}

// ─── INIT ───────────────────────────────────────────────────────────────
if(GAS_URL){S.needSetup=false;render();loadAllData()}
else{const loc=loadLocal();if(loc){S.dates=loc.dates;S.dayData=loc.dayData;S.selectedDate=S.dates[S.dates.length-1]||null;S.loading=false}render()}
</script>
</body>
</html>
